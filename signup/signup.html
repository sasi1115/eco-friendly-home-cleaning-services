<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EcoSpark Signup</title>

<!-- GOOGLE FONT -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="./signup.css">
<script src="./signup.js"defer></script>

</head>
<body>

<!-- FLOATING CIRCLES -->

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- SIGNUP CARD -->

<div class="signup-container">

    <!-- TOP CONTROLS -->

    <div class="top-controls">

        <button class="theme-btn" id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>

        <button class="rtl-btn" id="rtlBtn">
            RTL
        </button>

    </div>

    <!-- LOGO -->

    <a href="../Homepage-1/homepage.html" class="home-link">

    <div class="logo-box">

        <div class="logo">
            <i class="fa-solid fa-leaf"></i>
        </div>

    </div>

    <h1 class="brand">EcoSpark</h1>

</a>
    <!-- TEXT -->

    <h1 class="brand">EcoSpark</h1>

    <h2 class="heading">
        Create Account
    </h2>

    <p class="subtitle">
        Join EcoSpark and start your journey
    </p>

    <!-- FULL NAME -->

    <div class="input-group">

        <label>Full Name</label>

        <div class="input-box">

            <input
            type="text"
            placeholder="John Doe">

            <i class="fa-solid fa-user"></i>

        </div>

    </div>

    <!-- EMAIL -->

    <div class="input-group">

        <label>Email Address</label>

        <div class="input-box">

            <input
            type="email"
            placeholder="hello@example.com">

            <i class="fa-solid fa-envelope"></i>

        </div>

    </div>

    <!-- PASSWORD -->

    <div class="input-group">

        <label>Password</label>

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="••••••••">

            <i
            class="fa-solid fa-eye toggle-password"
            id="eye1"></i>

        </div>

        <!-- STRENGTH -->

        <div class="strength-box">

            <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
            </div>

            <div class="strength-text" id="strengthText">
                Password Strength
            </div>

        </div>

    </div>

    <!-- CONFIRM PASSWORD -->

    <div class="input-group">

        <label>Confirm Password</label>

        <div class="input-box">

            <input
            type="password"
            id="confirmPassword"
            placeholder="••••••••">

            <i
            class="fa-solid fa-eye toggle-password"
            id="eye2"></i>

        </div>

        <div class="match-message" id="matchMessage">
            ✓ Passwords Match
        </div>

    </div>

    <!-- TERMS -->

    <div class="terms">

        <input type="checkbox">

        <span>I agree to Terms & Conditions</span>

    </div>

    <!-- BUTTON -->

    <button class="signup-btn" id="signupBtn">

        <span id="btnText">
            Create Account
        </span>

        <div class="spinner" id="spinner"></div>

    </button>

    <!-- FOOTER -->

    <div class="footer">

        Already have an account?

        <a href="../login/login.html">
            Login
        </a>

    </div>

</div>





</body>
</html>
