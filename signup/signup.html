<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ========================= META ========================= -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        EcoSpark Sign Up
    </title>





    <!-- ========================= GOOGLE FONT ========================= -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">





    <!-- ========================= FONT AWESOME ========================= -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">





    <!-- ========================= CSS ========================= -->

    <link rel="stylesheet"
          href="./signup.css">





    <!-- ========================= JS ========================= -->

    <script src="../js/script.js" defer></script>
    <script src="./signup.js" defer></script>

</head>

<body>





    <!-- ========================= FLOATING SHAPES ========================= -->

    <div class="circle circle1"></div>

    <div class="circle circle2"></div>





    <!-- ========================= SIGNUP CARD ========================= -->

    <div class="signup-container">





        <!-- ========================= TOP CONTROLS ========================= -->

        <div class="top-controls">

            <button class="theme-btn"
                    id="themeToggle">

                <i class="fa-solid fa-moon"></i>

            </button>





            <button class="rtl-btn"
                    id="rtlToggle">

                RTL

            </button>

        </div>





       <!-- ========================= BRAND ROW ========================= -->

<div class="brand-row">

    <a href="../index.html"
       class="home-link">

        <div class="logo">

            <i class="fa-solid fa-leaf"></i>

        </div>

    </a>





    <div class="brand-text">

        EcoSpark

    </div>

</div>





        <!-- ========================= HEADING ========================= -->

        <h2 class="heading">

            Create Account

        </h2>





        <!-- ========================= SUBTITLE ========================= -->

        <p class="subtitle">

            Enter your details to access your account

        </p>





        <!-- ========================= FORM ========================= -->

        <form id="signupForm">





            <!-- ========================= FULL NAME ========================= -->

            <div class="input-group">

                <label>

                    Full Name

                </label>





                <div class="input-box">

                    <input type="text"
                           placeholder="John Doe"
                           required>





                    <i class="fa-solid fa-user"></i>

                </div>

            </div>





            <!-- ========================= EMAIL ========================= -->

            <div class="input-group">

                <label>

                    Email Address

                </label>





                <div class="input-box">

                    <input type="email"
                           placeholder="hello@example.com"
                           required>





                    <i class="fa-solid fa-envelope"></i>

                </div>

            </div>





            <!-- ========================= PASSWORD ========================= -->

            <div class="input-group">

                <label>

                    Password

                </label>





                <div class="input-box">

                    <input type="password"
                           placeholder="••••••••"
                           id="password"
                           required>





                    <i class="fa-solid fa-eye toggle-password"
                       id="togglePassword"></i>

                </div>

            </div>





            <!-- ========================= OPTIONS ROW ========================= -->

<div class="options-row">

    <label class="remember-me">

        <input type="checkbox">

        Remember me

    </label>





    <a href="#"
       class="forgot-password">

        Forgot password?

    </a>

</div>





<!-- ========================= SIGNUP BUTTON ========================= -->

<button class="signup-btn"
        id="signupBtn">

    <span id="btnText">

        Sign Up Now

    </span>





    <div class="spinner"
         id="spinner"></div>

</button>





<!-- ========================= DIVIDER ========================= -->

<div class="divider">

    Or continue with

</div>





<!-- ========================= SOCIAL LOGIN ========================= -->

<div class="social-login">

    <button class="social-btn">

        <i class="fa-brands fa-google"></i>

        Google

    </button>





    <button class="social-btn">

        <i class="fa-brands fa-apple"></i>

        Apple

    </button>

</div>





<!-- ========================= FOOTER ========================= -->

<div class="footer">

    Already have an account?

    <a href="../login/login.html">

        Login

    </a>

</div>





</body>

</html>
